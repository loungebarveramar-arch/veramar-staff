<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#17365D" />
  <title>VERAMAR STAFF</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>VERAMAR STAFF</h1>
      <p>Control horario</p>
    </div>
    <button id="installBtn" class="secondary hidden">Instalar</button>
  </header>

  <main>
    <section class="card">
      <h2>Registrar turno</h2>

      <label>Empleado
        <select id="empleado"></select>
      </label>

      <div class="grid2">
        <label>Fecha
          <input id="fecha" type="date" />
        </label>

        <label>Turno
          <select id="turno">
            <option>COMIDA</option>
            <option>CENA</option>
            <option>PARTIDO</option>
          </select>
        </label>
      </div>

      <div class="grid2">
        <label>Entrada
          <input id="entrada" inputmode="numeric" placeholder="12 o 12:30" />
        </label>

        <label>Salida
          <input id="salida" inputmode="numeric" placeholder="16 o 01:00" />
        </label>
      </div>

      <label>Observaciones
        <textarea id="observaciones" rows="2"></textarea>
      </label>

      <div class="hours-box">
        <span>Horas</span>
        <strong id="horas">0,00</strong>
      </div>

      <button id="guardarBtn" class="primary">Guardar turno</button>
      <p id="mensaje" class="message"></p>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Resumen del mes</h2>
        <select id="resumenEmpleado"></select>
      </div>
      <div class="summary">
        <div><span>Horas</span><strong id="resHoras">0,00</strong></div>
        <div><span>Turnos</span><strong id="resTurnos">0</strong></div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Últimos registros</h2>
        <button id="exportarBtn" class="secondary">Exportar CSV</button>
      </div>
      <div id="lista" class="records"></div>
    </section>

    <section class="card">
      <details>
        <summary>Gestionar empleados</summary>
        <div class="add-employee">
          <input id="nuevoEmpleado" placeholder="Nombre del empleado" />
          <button id="anadirEmpleadoBtn" class="secondary">Añadir</button>
        </div>
        <div id="empleadosLista" class="employee-list"></div>
      </details>
    </section>
  </main>

  <template id="registroTpl">
    <article class="record">
      <div>
        <strong class="r-empleado"></strong>
        <span class="r-detalle"></span>
      </div>
      <div class="record-actions">
        <button class="editar secondary small">Editar</button>
        <button class="eliminar danger small">Borrar</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
